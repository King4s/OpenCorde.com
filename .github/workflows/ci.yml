name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (test + clippy)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: opencorde
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d opencorde"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/opencorde
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev pkg-config
      - run: cargo install sqlx-cli --no-default-features --features postgres --locked
      - run: sqlx migrate run
        working-directory: crates/opencorde-db
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings

  frontend:
    name: Frontend (type-check + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install
        working-directory: client
      - run: pnpm check
        working-directory: client
      - run: pnpm lint
        working-directory: client

  tauri-check:
    name: Tauri build check (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './client/src-tauri -> target'
      - run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsecret-1-dev pkg-config
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install
        working-directory: client
      - run: pnpm build
        working-directory: client
      - run: cargo check
        working-directory: client/src-tauri
